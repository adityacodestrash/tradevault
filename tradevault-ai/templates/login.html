{% extends 'base.html' %}

{% block title %}Sign In — TradeVault AI{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="brand-icon-large">
                    <i class="fas fa-chart-line"></i>
                </div>
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Sign in to your trading vault</p>
            </div>

            <form method="POST" action="{{ url_for('login') }}" class="auth-form">
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-user"></i> Username or Email
                    </label>
                    <input type="text" name="username" class="form-input" 
                           placeholder="Enter username or email" required autofocus>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <div class="input-with-icon">
                        <input type="password" name="password" class="form-input" 
                               placeholder="Enter password" required id="passwordInput">
                        <button type="button" class="toggle-password" onclick="togglePassword('passwordInput', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" name="remember">
                        <span class="checkmark"></span>
                        Remember me
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <div class="auth-divider">
                <span>New to TradeVault?</span>
            </div>

            <a href="{{ url_for('signup') }}" class="btn btn-outline btn-block">
                <i class="fas fa-user-plus"></i> Create Account
            </a>
        </div>
    </div>
</div>
{% endblock %}
