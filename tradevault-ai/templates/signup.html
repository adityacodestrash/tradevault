{% extends 'base.html' %}

{% block title %}Create Account — TradeVault AI{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="brand-icon-large">
                    <i class="fas fa-chart-line"></i>
                </div>
                <h1 class="auth-title">Create Account</h1>
                <p class="auth-subtitle">Start your trading journey today</p>
            </div>

            <form method="POST" action="{{ url_for('signup') }}" class="auth-form">
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-user"></i> Username
                    </label>
                    <input type="text" name="username" class="form-input" 
                           placeholder="Choose a username" required minlength="3" autofocus>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-envelope"></i> Email
                    </label>
                    <input type="email" name="email" class="form-input" 
                           placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <div class="input-with-icon">
                        <input type="password" name="password" class="form-input" 
                               placeholder="Min 6 characters" required minlength="6" id="passwordInput">
                        <button type="button" class="toggle-password" onclick="togglePassword('passwordInput', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-lock"></i> Confirm Password
                    </label>
                    <div class="input-with-icon">
                        <input type="password" name="confirm_password" class="form-input" 
                               placeholder="Repeat password" required id="confirmInput">
                        <button type="button" class="toggle-password" onclick="togglePassword('confirmInput', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg">
                    <i class="fas fa-rocket"></i> Create Free Account
                </button>
            </form>

            <div class="auth-divider">
                <span>Already have an account?</span>
            </div>

            <a href="{{ url_for('login') }}" class="btn btn-outline btn-block">
                <i class="fas fa-sign-in-alt"></i> Sign In Instead
            </a>
        </div>
    </div>
</div>
{% endblock %}
